# ──────────────────────────────────────────────────────────────────────────────
# Fit Finder — CI/CD Pipeline
# ──────────────────────────────────────────────────────────────────────────────
#
# Branch protection setup (do this once in GitHub → Settings → Branches):
#   1. Add a branch protection rule for `main`
#   2. Enable "Require status checks to pass before merging"
#   3. Add these required checks:
#        • ci / test
#        • ci / build
#   4. Enable "Require branches to be up to date before merging"
#   5. Enable "Do not allow bypassing the above settings"
#
# Deployment (Railway + Vercel):
#   Railway and Vercel pick up pushes to `main` automatically via their GitHub
#   integration. The `deploy` job here is a lightweight gate — it only prints a
#   success message to confirm all CI steps passed before Railway/Vercel receive
#   the push event. No secrets need to be added to GitHub for deploys.
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests + TypeScript check ─────────────────────────────────────────
  test:
    name: Unit tests & type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Unit tests (Vitest)
        run: npm test

  # ── Production build check ─────────────────────────────────────────────────
  build:
    name: Build check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          SESSION_SECRET: ci-dummy-session-secret-at-least-32-characters

  # ── Playwright E2E tests (PRs only — requires a running server) ────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run on pull requests so we don't double-run on push-to-main
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fitfinder
          POSTGRES_PASSWORD: fitfinder
          POSTGRES_DB: fitfinder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://fitfinder:fitfinder@localhost:5432/fitfinder_test
          SESSION_SECRET: ci-e2e-session-secret-at-least-32-characters
          NODE_ENV: development
          PORT: 5000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Deploy gate (main only — actual deploy handled by Railway/Vercel) ──────
  deploy:
    name: Deploy gate
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: All checks passed
        run: |
          echo "✅ CI passed — Railway and Vercel will deploy automatically."
          echo "   Railway dashboard: https://railway.com"
          echo "   Vercel dashboard:  https://vercel.com"
